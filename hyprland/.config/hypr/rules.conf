#Global#
windowrule {
name = globalrules
match:class = .* 
animation = windows, 1, 8, default, popin 10%
}

#CachyOS Hello#
windowrule {
  name = cachyoshellorules
  match:class = CachyOSHello
  border_size = 2
  float = on
  center = 1
  opaque = on 
  size = 1000 500
}

#Firewall#
windowrule {
  name = firewallrules
  match:class = firewall-config
